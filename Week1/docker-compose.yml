version: '3.8'

services:
  db:
    image: mariadb:11.5
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopping_cart_localization
    ports:
      - "3306:3306"
    volumes:
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build: .
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mariadb://db:3306/shopping_cart_localization
      DB_USER: root
      DB_PASSWORD: root
